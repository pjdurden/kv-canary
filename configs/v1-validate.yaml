# configs/v1-validate.yaml — cheap wiring-validation pass before the full v1 matrix.
#
# RUNBOOK step 2: run this on Qwen2.5-0.5B FIRST to debug the CompressedCache on a RoPE model
# (distilgpt2 uses learned absolute positions and can't expose the two RoPE fidelity points —
# post-eviction re-positioning and the decode mask; see compressed_cache.py). One small model,
# one budget per family plus an aggressive 0.25 to actually perturb output, short outputs.
#
# What "validated" looks like:
#   * full vs each lossy method produce DIFFERENT output (divergence != NULL — the wiring fires);
#   * generation doesn't crash on the post-eviction cache (mask / cache_position are consistent);
#   * eviction methods degrade functional accuracy MORE than perplexity implies (the finding).
# Only then promote to configs/v1.yaml (Qwen2.5-7B, full budget sweep).
# Run via: ./scripts/run_gpu.sh validate   (or `python -m kvcanary run configs/v1-validate.yaml
#   --device cuda --data real --limit 20 --max-new-tokens 256`). Sample count comes from --limit
# (a `limits:` key here would be ignored by the loader).
models: [Qwen/Qwen2.5-0.5B-Instruct]
tasks: [code, tool, perplexity]
compressors:
  - {method: full,         budget: 1.0}
  - {method: quantized,    budget: 0.25}    # int4 KV
  - {method: streamingllm, budget: 0.5}
  - {method: streamingllm, budget: 0.25}    # aggressive: stresses RoPE re-positioning
  - {method: snapkv,       budget: 0.5}
  - {method: snapkv,       budget: 0.25}
